<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1000" viewBox="0 0 1900 1000">
<defs><style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style></defs>
<rect x="0" y="0" width="1900" height="1000" fill="#0d1117"/>
<text x="950" y="80" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="600">The problem this workshop solves</text>
<text x="950" y="124" font-size="17" fill="#9ca3af" text-anchor="middle">Why ad hoc eval setups stop working once you scale past a few hundred traces.</text>

<rect x="100" y="180" width="1700" height="120" rx="10" stroke="#ef4444" fill="#1f0a0a" stroke-width="2" />
<circle cx="160" cy="240" r="22" fill="#ef4444" />
<text x="160" y="250" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">!</text>
<text x="220" y="225" font-size="22" fill="#ffffff" font-weight="600">Eval data scattered across Delta tables</text>
<text x="220" y="265" font-size="16" fill="#9ca3af">Annotation, judges, monitoring all live in different places. No single queryable surface.</text>

<rect x="100" y="320" width="1700" height="120" rx="10" stroke="#ef4444" fill="#1f0a0a" stroke-width="2" />
<circle cx="160" cy="380" r="22" fill="#ef4444" />
<text x="160" y="390" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">!</text>
<text x="220" y="365" font-size="22" fill="#ffffff" font-weight="600">Ad hoc scorers do not survive a 10x trace-volume jump</text>
<text x="220" y="405" font-size="16" fill="#9ca3af">Trace volume x multi-judge fan-out is where unmanaged eval pipelines hit their ceiling.</text>

<rect x="100" y="460" width="1700" height="120" rx="10" stroke="#ef4444" fill="#1f0a0a" stroke-width="2" />
<circle cx="160" cy="520" r="22" fill="#ef4444" />
<text x="160" y="530" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">!</text>
<text x="220" y="505" font-size="22" fill="#ffffff" font-weight="600">Your existing observability stack lives elsewhere</text>
<text x="220" y="545" font-size="16" fill="#9ca3af">Two tools to learn. Two surfaces to debug. No unified failure-mode story.</text>

<rect x="100" y="600" width="1700" height="120" rx="10" stroke="#ef4444" fill="#1f0a0a" stroke-width="2" />
<circle cx="160" cy="660" r="22" fill="#ef4444" />
<text x="160" y="670" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="700">!</text>
<text x="220" y="645" font-size="22" fill="#ffffff" font-weight="600">Custom metrics are hard to plug in</text>
<text x="220" y="685" font-size="16" fill="#9ca3af">Prompt-based judges, statistical measures, third-party scorers, each is a one-off integration.</text>

<rect x="100" y="740" width="1700" height="120" rx="10" stroke="#22c55e" fill="#0a1f0a" stroke-width="2" />
<circle cx="160" cy="800" r="22" fill="#22c55e" />
<text x="160" y="811" font-size="26" fill="#0a1f0a" text-anchor="middle" font-weight="700">&#10003;</text>
<text x="220" y="785" font-size="22" fill="#ffffff" font-weight="600">What this workshop gives you</text>
<text x="220" y="825" font-size="16" fill="#86efac">One eval surface, one trace table, one scorer registry, every component named by maturity.</text>
</svg>
