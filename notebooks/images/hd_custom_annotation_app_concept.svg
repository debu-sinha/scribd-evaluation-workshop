<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="740" viewBox="-20 20 1380 740">
<defs><marker id="arrow-9ca3af" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" /></marker><style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style></defs>
<rect x="-20" y="20" width="1380" height="740" fill="#0d1117"/>
<text x="0" y="72" font-size="32" fill="#ffffff">Custom annotation app for PDF-grounded review</text>
<text x="0" y="108" font-size="16" fill="#9ca3af">The MLflow Review App API is the stable surface. The web layer is what you build.</text>
<rect x="60" y="180" width="380" height="560" rx="8" stroke="#3b82f6" fill="#0a1929" stroke-width="2" />
<text x="85" y="232" font-size="22" fill="#60a5fa">1.  Source artifacts</text>
<text x="85" y="275" font-size="15" fill="#e5e7eb">Source PDF lives in a</text>
<text x="85" y="303" font-size="15" fill="#e5e7eb">UC Volume</text>
<text x="85" y="331" font-size="15" fill="#e5e7eb">Parsed markdown is the</text>
<text x="85" y="359" font-size="15" fill="#e5e7eb">output of your</text>
<text x="85" y="387" font-size="15" fill="#e5e7eb">document-intel pipeline</text>
<text x="85" y="435" font-size="15" fill="#e5e7eb">On each trace span,</text>
<text x="85" y="463" font-size="15" fill="#e5e7eb">two attributes:</text>
<text x="85" y="502" font-size="14" fill="#60a5fa">  source_pdf_uri</text>
<text x="85" y="530" font-size="14" fill="#60a5fa">  parsed_markdown</text>
<text x="85" y="595" font-size="15" fill="#e5e7eb">Trace metadata carries</text>
<text x="85" y="623" font-size="15" fill="#e5e7eb">the routing pointer the</text>
<text x="85" y="651" font-size="15" fill="#e5e7eb">annotator app reads at</text>
<text x="85" y="679" font-size="15" fill="#e5e7eb">review time.</text>
<rect x="510" y="180" width="380" height="560" rx="8" stroke="#a78bfa" fill="#1a0a29" stroke-width="2" />
<text x="535" y="232" font-size="22" fill="#c4b5fd">2.  Custom Databricks App</text>
<text x="535" y="275" font-size="15" fill="#e5e7eb">Built on the Review App</text>
<text x="535" y="303" font-size="15" fill="#e5e7eb">API template:</text>
<text x="535" y="343" font-size="15" fill="#e5e7eb">  Pulls trace via</text>
<text x="535" y="369" font-size="13" fill="#c4b5fd">  mlflow.search_traces</text>
<text x="535" y="411" font-size="15" fill="#e5e7eb">  Renders PDF (PDF.js</text>
<text x="535" y="439" font-size="15" fill="#e5e7eb">  or Adobe Embed)</text>
<text x="535" y="479" font-size="15" fill="#e5e7eb">  Renders parsed</text>
<text x="535" y="507" font-size="15" fill="#e5e7eb">  markdown side by side</text>
<text x="535" y="555" font-size="15" fill="#e5e7eb">Auth via Databricks Apps</text>
<text x="535" y="583" font-size="15" fill="#e5e7eb">OAuth. External</text>
<text x="535" y="611" font-size="15" fill="#e5e7eb">annotators get</text>
<text x="535" y="639" font-size="15" fill="#e5e7eb">account-only access</text>
<text x="535" y="667" font-size="15" fill="#e5e7eb">(no workspace SCIM).</text>
<rect x="960" y="180" width="380" height="560" rx="8" stroke="#34d399" fill="#0a291a" stroke-width="2" />
<text x="985" y="232" font-size="22" fill="#6ee7b7">3.  Write-back to MLflow</text>
<text x="985" y="275" font-size="15" fill="#e5e7eb">Annotator submits via</text>
<text x="985" y="313" font-size="13" fill="#6ee7b7">  mlflow.log_feedback</text>
<text x="985" y="355" font-size="15" fill="#e5e7eb">Same API the built-in</text>
<text x="985" y="383" font-size="15" fill="#e5e7eb">Review App uses, so</text>
<text x="985" y="411" font-size="15" fill="#e5e7eb">feedback lands on the</text>
<text x="985" y="439" font-size="15" fill="#e5e7eb">same trace fields.</text>
<text x="985" y="487" font-size="15" fill="#e5e7eb">Downstream eval</text>
<text x="985" y="515" font-size="15" fill="#e5e7eb">(judge.align, scheduled</text>
<text x="985" y="543" font-size="15" fill="#e5e7eb">scorers, aggregation</text>
<text x="985" y="571" font-size="15" fill="#e5e7eb">policies) treats custom</text>
<text x="985" y="599" font-size="15" fill="#e5e7eb">and built-in</text>
<text x="985" y="627" font-size="15" fill="#e5e7eb">annotations</text>
<text x="985" y="655" font-size="15" fill="#e5e7eb">interchangeably.</text>
<path d="M 440 460 L 510 460" stroke="#9ca3af" fill="none" stroke-width="2" marker-end="url(#arrow-9ca3af)" />
<path d="M 890 460 L 960 460" stroke="#9ca3af" fill="none" stroke-width="2" marker-end="url(#arrow-9ca3af)" />
</svg>
