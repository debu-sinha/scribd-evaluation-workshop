<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1000" viewBox="0 0 1900 1000">
<defs><style>text { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }</style></defs>
<rect x="0" y="0" width="1900" height="1000" fill="#0d1117"/>
<text x="950" y="72" font-size="34" fill="#ffffff" text-anchor="middle" font-weight="600">Two scorer shapes you will use</text>
<text x="950" y="120" font-size="17" fill="#9ca3af" text-anchor="middle">@scorer for deterministic code metrics. make_judge for LLM-judged metrics. Same output shape.</text>

<rect x="80" y="180" width="880" height="600" rx="10" stroke="#3b82f6" fill="#0a1929" stroke-width="2" />
<text x="120" y="232" font-size="28" fill="#60a5fa" font-weight="600">@scorer</text>
<text x="280" y="232" font-size="20" fill="#9ca3af">code-based</text>
<text x="120" y="278" font-size="16" fill="#cbd5e1">Deterministic. Returns a float. Cheap.</text>
<text x="120" y="306" font-size="16" fill="#cbd5e1">Use for sanity gates and safety checks.</text>

<rect x="120" y="340" width="800" height="380" rx="6" fill="#020617" stroke="#1e293b" stroke-width="1" />
<text x="140" y="378" font-size="16" fill="#60a5fa" font-family="monospace">from mlflow.genai.scorers import scorer</text>
<text x="140" y="418" font-size="16" fill="#60a5fa" font-family="monospace">@scorer</text>
<text x="140" y="446" font-size="16" fill="#e5e7eb" font-family="monospace">def answer_contains_keyword(</text>
<text x="160" y="474" font-size="16" fill="#e5e7eb" font-family="monospace">outputs: dict,</text>
<text x="160" y="502" font-size="16" fill="#e5e7eb" font-family="monospace">expectations: dict,</text>
<text x="140" y="530" font-size="16" fill="#e5e7eb" font-family="monospace">) -&gt; float:</text>
<text x="160" y="558" font-size="16" fill="#e5e7eb" font-family="monospace">answer = (outputs.get("answer") or "").lower()</text>
<text x="160" y="586" font-size="16" fill="#e5e7eb" font-family="monospace">expected = (expectations.get("expected") or "").lower()</text>
<text x="160" y="614" font-size="16" fill="#e5e7eb" font-family="monospace">if not expected:</text>
<text x="180" y="642" font-size="16" fill="#e5e7eb" font-family="monospace">return 0.0</text>
<text x="160" y="670" font-size="16" fill="#e5e7eb" font-family="monospace">keywords = expected.split()</text>
<text x="160" y="698" font-size="16" fill="#e5e7eb" font-family="monospace">return sum(k in answer for k in keywords) / len(keywords)</text>

<rect x="980" y="180" width="840" height="600" rx="10" stroke="#a78bfa" fill="#1a0a29" stroke-width="2" />
<text x="1020" y="232" font-size="28" fill="#c4b5fd" font-weight="600">make_judge</text>
<text x="1216" y="232" font-size="20" fill="#9ca3af">LLM-judged</text>
<text x="1020" y="278" font-size="16" fill="#cbd5e1">Prompt template + model URI. Returns a category.</text>
<text x="1020" y="306" font-size="16" fill="#cbd5e1">Use for relevance, groundedness, faithfulness.</text>

<rect x="1020" y="340" width="760" height="380" rx="6" fill="#020617" stroke="#1e293b" stroke-width="1" />
<text x="1040" y="378" font-size="16" fill="#c4b5fd" font-family="monospace">from mlflow.genai.judges import make_judge</text>
<text x="1040" y="418" font-size="16" fill="#e5e7eb" font-family="monospace">relevance_judge = make_judge(</text>
<text x="1060" y="446" font-size="16" fill="#e5e7eb" font-family="monospace">name="relevance",</text>
<text x="1060" y="474" font-size="16" fill="#e5e7eb" font-family="monospace">instructions=(</text>
<text x="1080" y="502" font-size="16" fill="#e5e7eb" font-family="monospace">"Question: {{ inputs }}\\n"</text>
<text x="1080" y="530" font-size="16" fill="#e5e7eb" font-family="monospace">"Answer: {{ outputs }}\\n"</text>
<text x="1080" y="558" font-size="16" fill="#e5e7eb" font-family="monospace">"Reply: yes / partial / no"</text>
<text x="1060" y="586" font-size="16" fill="#e5e7eb" font-family="monospace">),</text>
<text x="1060" y="614" font-size="16" fill="#e5e7eb" font-family="monospace">model="databricks:/claude-sonnet-4-6",</text>
<text x="1060" y="642" font-size="16" fill="#e5e7eb" font-family="monospace">feedback_value_type=Literal[</text>
<text x="1080" y="670" font-size="16" fill="#e5e7eb" font-family="monospace">"yes", "partial", "no"</text>
<text x="1060" y="698" font-size="16" fill="#e5e7eb" font-family="monospace">],</text>
<text x="1040" y="726" font-size="16" fill="#e5e7eb" font-family="monospace">)</text>

<rect x="80" y="810" width="1740" height="160" rx="10" stroke="#f59e0b" fill="#1a1408" stroke-width="2" />
<text x="950" y="858" font-size="20" fill="#fbbf24" text-anchor="middle" font-weight="600">Both write assessments to the trace, in the same UC catalog.</text>
<text x="950" y="894" font-size="15" fill="#d1d5db" text-anchor="middle">Mix and match in the same mlflow.genai.evaluate call. Same Evaluation UI, same SQL surface, same governance.</text>
<text x="950" y="922" font-size="15" fill="#d1d5db" text-anchor="middle">Third-party scorers (RAGAS, DeepEval, Arize) plug in via the same @scorer decorator.</text>
</svg>
